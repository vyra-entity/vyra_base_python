# pytest.ini
[pytest]
minversion = 7.0
addopts = -ra -q --tb=short --strict-markers --cov=vyra_base --cov-report=term-missing --cov-report=html --cov-fail-under=70
testpaths = 
    tests
markers =
    asyncio: mark test as asyncio
    no_dataspace_reset: skip dataspace reset fixture for standalone tests
    unit: mark test as unit test
    integration: mark test as integration test
    slow: mark test as slow
    redis: mark test as requiring Redis
    ros2: mark test as requiring ROS2
    zenoh: mark test as requiring Zenoh